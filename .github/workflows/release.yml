name: Release

# タグ (例: DiTiS-v26.222.1) を push したときに自動ビルド＆リリース
on:
  push:
    tags:
      - 'DiTiS-v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Node dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: |
            ## ${{ github.ref_name }}

            ### ダウンロード
            - **Windows**: `*_x64-setup.exe`
            - **macOS (Apple Silicon)**: `*_aarch64.dmg`
            - **macOS (Intel)**: `*_x64.dmg`
            - **Linux**: `*_amd64.AppImage`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  cleanup-sigs:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove .sig files and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.ref_name }}"
          # ドラフトリリースはタグ検索できないのでリスト取得してフィルタ
          RELEASE_ID=$(gh api repos/$GH_REPO/releases \
            --jq ".[] | select(.tag_name == \"$TAG\") | .id")
          echo "Release ID: $RELEASE_ID"
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::Release not found for tag $TAG"
            exit 1
          fi

          # .sig ファイルを削除
          gh api repos/$GH_REPO/releases/$RELEASE_ID/assets \
            --jq '.[] | select(.name | endswith(".sig")) | .id' \
            | xargs -r -I{} gh api -X DELETE repos/$GH_REPO/releases/assets/{}

          # ドラフトを公開
          gh api -X PATCH repos/$GH_REPO/releases/$RELEASE_ID \
            --field draft=false
